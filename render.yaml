services:
  - type: web
    name: client-manager
    env: python
    plan: free
    buildCommand: pip install -r Server/requirements.txt && cd Client && npm install && npm run build
    startCommand: cd Server && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: client-manager-db
          property: connectionString
      - key: SMS_GATEWAY_DOMAIN
        value: vtext.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USE_TLS
        value: "false"

databases:
  - name: client-manager-db
    plan: free
